<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materialidad Pro - V8.1 Botones Restaurados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <div id="auth-modal" class="hidden fixed inset-0 bg-slate-900/60 flex items-center justify-center z-[100] backdrop-blur-sm">
        <div class="bg-white p-6 rounded-2xl shadow-2xl max-w-sm w-full border border-slate-200 transform scale-100 transition-all">
            <h3 class="text-lg font-black text-slate-800 mb-2" id="auth-title"></h3>
            <p class="text-sm text-slate-500 mb-4" id="auth-message"></p>
            <input type="password" id="auth-input" class="w-full border-2 border-slate-200 p-3 rounded-xl mb-4 focus:border-blue-500 outline-none text-center tracking-[0.2em] font-bold text-lg" placeholder="••••••••" onkeypress="if(event.key === 'Enter') submitAuth()">
            <div class="flex justify-end gap-2">
                <button onclick="closeAuth()" class="px-4 py-2 text-slate-500 hover:bg-slate-100 rounded-lg text-sm font-bold transition">Cancelar</button>
                <button onclick="submitAuth()" class="px-4 py-2 bg-blue-600 text-white hover:bg-blue-700 rounded-lg text-sm font-bold shadow transition">Autorizar</button>
            </div>
        </div>
    </div>

    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2 cursor-pointer" onclick="goHome()">
                <i class="fas fa-shield-alt text-blue-400"></i> MATERIALIDAD V8.1
            </h1>
            <div class="flex gap-3">
                <button onclick="requireAuth(() => showView('v-team'))" class="text-sm hover:text-blue-300 transition px-2">
                    <i class="fas fa-users-cog mr-1"></i> Equipo y Claves
                </button>
                <button onclick="requireAuth(() => showView('v-admin'))" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-sm font-bold transition">
                    <i class="fas fa-plus mr-1"></i> Nuevo Proyecto
                </button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-6">
        
        <div id="breadcrumbs" class="text-sm font-bold text-slate-500 mb-6 flex gap-2 items-center hidden">
            <span class="cursor-pointer hover:text-blue-600" onclick="goHome()">🏠 Inicio</span>
            <span id="bc-operator" class="hidden cursor-pointer hover:text-blue-600" onclick="clearClient()"></span>
            <span id="bc-client" class="hidden text-slate-800"></span>
        </div>

        <section id="v-home" class="mb-8">
            <h2 class="text-2xl font-black text-slate-800 mb-6 uppercase tracking-tight">Operadores Activos</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4" id="operators-grid"></div>
        </section>

        <section id="v-dashboard" class="hidden grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col h-[75vh]">
                <div id="sidebar-header" class="flex justify-between items-center mb-4 border-b pb-2">
                    <h3 id="sidebar-title" class="text-sm font-black text-slate-600 uppercase tracking-widest"></h3>
                    <button id="btn-back-sidebar" onclick="clearClient()" class="hidden text-slate-400 hover:text-slate-800"><i class="fas fa-arrow-left"></i></button>
                </div>
                <div id="sidebar-list" class="space-y-2 overflow-y-auto pr-2 custom-scroll flex-grow"></div>
            </div>
            <div class="lg:col-span-3">
                <div id="detail-placeholder" class="h-full min-h-[400px] border-2 border-dashed border-slate-300 rounded-2xl flex flex-col items-center justify-center text-slate-400 p-10 bg-white">
                    <i class="fas fa-hand-pointer text-4xl mb-4"></i>
                    <p class="font-medium text-center">Selecciona un elemento en el panel lateral</p>
                </div>
                <div id="detail-content" class="hidden bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden relative flex flex-col h-[75vh]"></div>
            </div>
        </section>

        <section id="v-admin" class="hidden max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow-2xl">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h2 class="text-2xl font-black italic text-blue-700"><i class="fas fa-unlock-alt mr-2"></i> MODO ADMIN: NUEVO PROYECTO</h2>
                <button onclick="goHome()" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form id="project-form" class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-xs font-bold text-slate-500 uppercase">Operador</label><select id="f-operator" class="w-full border p-3 rounded-xl outline-blue-500" required></select></div>
                    <div><label class="text-xs font-bold text-slate-500 uppercase">Fecha Compromiso</label><input type="date" id="f-deadline" class="w-full border p-3 rounded-xl outline-blue-500" required></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-xs font-bold text-slate-500 uppercase">Cliente</label><input type="text" id="f-client" placeholder="Ej: Carga Terrestre" class="w-full border p-3 rounded-xl outline-blue-500" required></div>
                    <div><label class="text-xs font-bold text-slate-500 uppercase">Proyecto</label><input type="text" id="f-project-name" placeholder="Ej: Auditoría 2024" class="w-full border p-3 rounded-xl outline-blue-500" required></div>
                </div>
                <div class="grid grid-cols-2 gap-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <div><label class="text-xs font-bold text-slate-500 uppercase">Encargado Materialidad 1</label><select id="f-man1" class="w-full border p-2 rounded-lg outline-blue-500" required></select></div>
                    <div><label class="text-xs font-bold text-slate-500 uppercase">Encargado 2 (Opcional)</label><select id="f-man2" class="w-full border p-2 rounded-lg outline-blue-500"><option value="">-- Ninguno --</option></select></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <textarea id="f-legal-list" rows="3" class="border p-3 rounded-xl text-sm" placeholder="Checklist Legal (uno por línea)"></textarea>
                    <textarea id="f-mat-list" rows="3" class="border p-3 rounded-xl text-sm" placeholder="Checklist Materialidad (uno por línea)"></textarea>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg">CREAR PROYECTO</button>
            </form>
        </section>

        <section id="v-team" class="hidden max-w-5xl mx-auto">
             <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h2 class="text-2xl font-black italic text-blue-700"><i class="fas fa-users-cog mr-2"></i> GESTIÓN DE EQUIPO Y CLAVES</h2>
                <button onclick="goHome()" class="text-slate-400 hover:text-slate-600 bg-white px-3 py-1 rounded shadow"><i class="fas fa-times mr-1"></i> Cerrar</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                 <div class="bg-white p-6 rounded-2xl shadow-lg border border-slate-200">
                    <h3 class="font-black text-lg mb-4 text-slate-800"><i class="fas fa-user-tie mr-2"></i>Operadores</h3>
                    <div class="flex gap-2 mb-4 bg-slate-50 p-3 rounded-xl border">
                        <input type="text" id="new-operator" class="border p-2 rounded-lg w-1/2 text-sm outline-blue-500" placeholder="Nombre">
                        <input type="password" id="new-op-pass" class="border p-2 rounded-lg w-1/2 text-sm outline-blue-500" placeholder="Contraseña">
                        <button onclick="addTeamMember('ops')" class="bg-blue-600 text-white px-4 rounded-lg font-bold hover:bg-blue-700 transition">+</button>
                    </div>
                    <ul id="list-ops" class="space-y-2 text-sm"></ul>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-lg border border-slate-200">
                    <h3 class="font-black text-lg mb-4 text-slate-800"><i class="fas fa-clipboard-check mr-2"></i>Encargados Materialidad</h3>
                    <div class="flex gap-2 mb-4 bg-slate-50 p-3 rounded-xl border">
                        <input type="text" id="new-manager" class="border p-2 rounded-lg w-1/2 text-sm outline-blue-500" placeholder="Nombre Encargado">
                        <input type="password" id="new-man-pass" class="border p-2 rounded-lg w-1/2 text-sm outline-blue-500" placeholder="Contraseña">
                        <button onclick="addTeamMember('mans')" class="bg-blue-600 text-white px-4 rounded-lg font-bold hover:bg-blue-700 transition">+</button>
                    </div>
                    <ul id="list-mans" class="space-y-2 text-sm"></ul>
                </div>
            </div>
        </section>

    </div>

    <script>
        // --- BASE DE DATOS LOCAL ---
        const ADMIN_PASS = "192426";
        let opsDB = JSON.parse(localStorage.getItem('ops_v4')) || ["Miriam", "Claudia", "Sinhue", "Carmona", "Mario"];
        let mansDB = JSON.parse(localStorage.getItem('mans_v4')) || ["Emmanuel", "Maite", "Julia", "Amaury", "Alfredo", "Caleb"];
        let projects = JSON.parse(localStorage.getItem('mat_v4')) || [];
        
        let opPasswords = JSON.parse(localStorage.getItem('opsPass_v8')) || {
            "Miriam": "1111", "Claudia": "2222", "Sinhue": "3333", "Carmona": "4444", "Mario": "5555"
        };

        let mansPasswords = JSON.parse(localStorage.getItem('mansPass_v8')) || {
            "Emmanuel": "6666", "Maite": "7777", "Julia": "8888", "Amaury": "9999", "Alfredo": "1010", "Caleb": "1212"
        };

        function save() {
            localStorage.setItem('ops_v4', JSON.stringify(opsDB));
            localStorage.setItem('mans_v4', JSON.stringify(mansDB));
            localStorage.setItem('mat_v4', JSON.stringify(projects));
            localStorage.setItem('opsPass_v8', JSON.stringify(opPasswords));
            localStorage.setItem('mansPass_v8', JSON.stringify(mansPasswords));
        }

        // --- SISTEMA DE AUTENTICACIÓN ---
        let authCallback = null;
        let authMode = 'admin'; 

        function requireAuth(callback) {
            authMode = 'admin';
            authCallback = callback;
            document.getElementById('auth-title').innerHTML = '<i class="fas fa-shield-alt text-red-600 mr-2"></i>ACCIÓN PROTEGIDA';
            document.getElementById('auth-message').innerText = 'Ingrese la contraseña maestra para continuar:';
            document.getElementById('auth-input').value = '';
            document.getElementById('auth-modal').classList.remove('hidden');
            setTimeout(() => document.getElementById('auth-input').focus(), 100);
        }

        function requireIdentify(callback, actionStr) {
            authMode = 'identify';
            authCallback = callback;
            document.getElementById('auth-title').innerHTML = '<i class="fas fa-user-lock text-blue-600 mr-2"></i>IDENTIFICACIÓN';
            document.getElementById('auth-message').innerText = `Para ${actionStr} este elemento, ingrese su contraseña personal o la maestra:`;
            document.getElementById('auth-input').value = '';
            document.getElementById('auth-modal').classList.remove('hidden');
            setTimeout(() => document.getElementById('auth-input').focus(), 100);
        }

        function closeAuth() {
            document.getElementById('auth-modal').classList.add('hidden');
            authCallback = null;
        }

        function submitAuth() {
            const pass = document.getElementById('auth-input').value;
            const accionPendiente = authCallback; 

            if (authMode === 'admin') {
                if (pass === ADMIN_PASS) { 
                    closeAuth(); 
                    if (accionPendiente) accionPendiente(); 
                } else { 
                    alert('❌ Contraseña incorrecta.'); 
                    document.getElementById('auth-input').value = ''; 
                }
            } else if (authMode === 'identify') {
                const user = identifyUser(pass);
                if (user) { 
                    closeAuth(); 
                    if (accionPendiente) accionPendiente(user); 
                } else { 
                    alert('❌ Contraseña incorrecta.'); 
                    document.getElementById('auth-input').value = ''; 
                }
            }
        }

        function identifyUser(pass) {
            if (pass === ADMIN_PASS) return "Admin";
            for (let op in opPasswords) { if (opPasswords[op] === pass) return op; }
            for (let man in mansPasswords) { if (mansPasswords[man] === pass) return man; }
            return null;
        }

        // --- NAVEGACIÓN Y RENDERIZADO ---
        let currentOp = null; let currentClient = null; let currentProjId = null;

        function showView(id) {
            ['v-home', 'v-dashboard', 'v-admin', 'v-team'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById('breadcrumbs').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
            if(id === 'v-admin') renderFormSelects();
            if(id === 'v-team') renderTeamLists();
        }

        function goHome() { currentOp = null; currentClient = null; currentProjId = null; showView('v-home'); renderHomeGrid(); }

        function renderHomeGrid() {
            const grid = document.getElementById('operators-grid'); grid.innerHTML = '';
            opsDB.forEach(op => {
                const count = projects.filter(p => p.operator === op && p.status !== 'Cerrado').length;
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-2xl shadow-sm border border-slate-200 text-center cursor-pointer hover:border-blue-400 transition transform hover:-translate-y-1";
                div.onclick = () => selectOperator(op);
                div.innerHTML = `<div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-3 text-xl"><i class="fas fa-user"></i></div><h4 class="font-bold text-slate-800">${op}</h4><p class="text-[10px] text-slate-400 font-bold uppercase mt-1">${count} Proy. Abiertos</p>`;
                grid.appendChild(div);
            });
        }

        function selectOperator(op) { currentOp = op; currentClient = null; currentProjId = null; showView('v-dashboard'); updateBreadcrumbs(); renderSidebar(); clearDetail(); }
        function clearClient() { currentClient = null; currentProjId = null; updateBreadcrumbs(); renderSidebar(); clearDetail(); }
        
        function updateBreadcrumbs() {
            const bc = document.getElementById('breadcrumbs'); const opSpan = document.getElementById('bc-operator'); const clSpan = document.getElementById('bc-client');
            bc.classList.remove('hidden');
            if(currentOp) { opSpan.classList.remove('hidden'); opSpan.innerHTML = ` / <i class="fas fa-user-tie"></i> ${currentOp}`; } else { opSpan.classList.add('hidden'); }
            if(currentClient) { clSpan.classList.remove('hidden'); clSpan.innerHTML = ` / <i class="fas fa-building"></i> ${currentClient}`; } else { clSpan.classList.add('hidden'); }
        }

        function renderSidebar() {
            const list = document.getElementById('sidebar-list'); const title = document.getElementById('sidebar-title'); const btnBack = document.getElementById('btn-back-sidebar');
            list.innerHTML = '';
            if (!currentClient) {
                title.innerText = "Cartera de Clientes"; btnBack.classList.add('hidden');
                const clientNames = [...new Set(projects.filter(p => p.operator === currentOp).map(p => p.client))];
                clientNames.forEach(clientName => {
                    const count = projects.filter(p => p.operator === currentOp && p.client === clientName).length;
                    const btn = document.createElement('div');
                    btn.className = "w-full text-left p-3 rounded-xl border border-transparent hover:bg-slate-50 cursor-pointer flex justify-between items-center group transition";
                    btn.innerHTML = `<div onclick="selectClient('${clientName}')" class="flex-grow"><p class="font-bold text-slate-800 text-sm">${clientName}</p><p class="text-[10px] text-slate-400">${count} Proyectos</p></div><button onclick="requireAuth(() => transferClient('${clientName}'))" class="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-blue-600 p-2"><i class="fas fa-exchange-alt"></i></button>`;
                    list.appendChild(btn);
                });
            } else {
                title.innerText = "Proyectos: " + currentClient; btnBack.classList.remove('hidden');
                const projs = projects.filter(p => p.operator === currentOp && p.client === currentClient);
                projs.forEach(p => {
                    const isClosed = p.status === 'Cerrado';
                    const btn = document.createElement('button');
                    btn.className = `w-full text-left p-3 rounded-xl border-2 mb-2 transition-all ${currentProjId === p.id ? 'border-blue-500 bg-white shadow-md' : (isClosed ? 'border-green-200 bg-green-50 opacity-70' : 'border-slate-100 bg-white hover:border-slate-300')}`;
                    btn.onclick = () => selectProject(p.id);
                    btn.innerHTML = `<p class="font-bold text-sm ${isClosed ? 'text-green-800 line-through' : 'text-slate-800'}">${p.projectName}</p><p class="text-[10px] mt-1 ${isClosed ? 'text-green-600' : 'text-slate-400'}"><i class="far fa-calendar"></i> Límite: ${p.deadline}</p>`;
                    list.appendChild(btn);
                });
            }
        }

        function selectClient(clientName) { currentClient = clientName; updateBreadcrumbs(); renderSidebar(); }
        function clearDetail() { document.getElementById('detail-placeholder').classList.remove('hidden'); document.getElementById('detail-content').classList.add('hidden'); }

        function selectProject(id) {
            currentProjId = id; renderSidebar();
            const p = projects.find(x => x.id === id);
            document.getElementById('detail-placeholder').classList.add('hidden');
            const detail = document.getElementById('detail-content'); detail.classList.remove('hidden');
            const isClosed = p.status === 'Cerrado';

            detail.innerHTML = `
                <div class="p-4 border-b flex justify-between items-start ${isClosed ? 'bg-green-600 text-white' : 'bg-slate-800 text-white'} flex-shrink-0">
                    <div>
                        <span class="text-[10px] ${isClosed ? 'bg-green-800' : 'bg-blue-600'} px-2 py-1 rounded font-bold uppercase">${p.client}</span>
                        <h2 class="text-xl font-black mt-1">${p.projectName}</h2>
                        <p class="text-xs mt-1 opacity-80"><i class="fas fa-users"></i> Encargados: ${p.managers.join(' y ')}</p>
                    </div>
                    
                    <div class="flex flex-col gap-2 min-w-[140px]">
                        <button onclick="requireAuth(() => toggleStatus(${p.id}))" class="px-3 py-1.5 rounded text-xs font-bold ${isClosed ? 'bg-white text-green-700' : 'bg-green-500 hover:bg-green-400 text-white'} shadow transition">
                            <i class="fas ${isClosed ? 'fa-lock-open' : 'fa-lock'}"></i> ${isClosed ? 'Reabrir Proyecto' : 'Cerrar Proyecto'}
                        </button>
                        <button onclick="requireAuth(() => transferProject(${p.id}))" class="px-3 py-1.5 rounded text-xs font-bold bg-slate-500 hover:bg-slate-400 text-white shadow transition">
                            <i class="fas fa-exchange-alt"></i> Trasladar
                        </button>
                        <button onclick="requireAuth(() => deleteProject(${p.id}))" class="px-3 py-1.5 rounded text-xs font-bold bg-red-600 hover:bg-red-500 text-white shadow transition">
                            <i class="fas fa-trash"></i> Eliminar
                        </button>
                    </div>
                </div>
                
                <div class="p-4 grid grid-cols-1 md:grid-cols-2 gap-4 ${isClosed ? 'bg-green-50' : 'bg-white'} border-b overflow-y-auto max-h-[30vh] custom-scroll flex-shrink-0">
                    <div>
                        <div class="flex justify-between items-center border-b pb-1 mb-2 text-slate-700"><h3 class="text-[10px] font-black uppercase">Legales</h3>${!isClosed ? `<button onclick="requireAuth(() => addItem(${p.id}, 'legal'))" class="text-blue-500 hover:text-blue-700"><i class="fas fa-plus"></i></button>` : ''}</div>
                        ${renderChecklist(p, 'legal', isClosed)}
                    </div>
                    <div>
                        <div class="flex justify-between items-center border-b pb-1 mb-2 text-slate-700"><h3 class="text-[10px] font-black uppercase">Materialidad</h3>${!isClosed ? `<button onclick="requireAuth(() => addItem(${p.id}, 'materialidad'))" class="text-blue-500 hover:text-blue-700"><i class="fas fa-plus"></i></button>` : ''}</div>
                        ${renderChecklist(p, 'materialidad', isClosed)}
                    </div>
                </div>
                
                <div class="flex-grow bg-slate-50 flex flex-col overflow-hidden">
                    <div class="p-2 border-b bg-slate-100 flex justify-between items-center text-xs font-bold text-slate-500 uppercase">
                        <span><i class="fas fa-comments mr-1"></i> Bitácora de Comentarios</span>
                    </div>
                    <div id="chat-messages" class="flex-grow overflow-y-auto p-4 space-y-3 chat-scroll">
                        ${renderChat(p)}
                    </div>
                    ${!isClosed ? `
                    <div class="p-3 bg-white border-t flex gap-2 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                        <select id="chat-author" class="border rounded-lg px-2 text-xs font-bold outline-none bg-slate-50">
                            <option value="${currentOp}">Yo (${currentOp})</option>
                            ${mansDB.map(m => `<option value="${m}">${m}</option>`).join('')}
                            <option value="Admin">Admin</option>
                        </select>
                        <input type="text" id="chat-input" placeholder="Escribe un avance libremente..." class="flex-grow border-2 border-slate-100 rounded-lg px-3 text-sm outline-blue-500 transition" onkeypress="if(event.key === 'Enter') sendChatMessage(${p.id})">
                        <button onclick="sendChatMessage(${p.id})" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold transition"><i class="fas fa-paper-plane"></i></button>
                    </div>
                    ` : '<div class="p-3 text-center text-xs text-green-700 font-bold bg-green-100">PROYECTO CERRADO</div>'}
                </div>
            `;
            const chatBox = document.getElementById('chat-messages'); if(chatBox) chatBox.scrollTop = chatBox.scrollHeight;
        }

        function renderChecklist(p, type, isClosed) {
            return p[type].map((item, idx) => `
                <div class="flex items-center justify-between py-1 group border-b border-transparent hover:border-slate-100">
                    <label class="flex items-center gap-2 ${isClosed ? 'cursor-not-allowed opacity-70' : 'cursor-pointer'}">
                        <input type="checkbox" ${item.done ? 'checked' : ''} ${isClosed ? 'disabled' : `onchange="toggleStep(${p.id}, '${type}', ${idx})"`} class="w-3 h-3 rounded text-blue-600">
                        <span class="text-xs ${item.done ? 'line-through text-slate-400' : 'text-slate-800'}">${item.name}</span>
                    </label>
                    ${!isClosed ? `<button onclick="requireAuth(() => deleteItem(${p.id}, '${type}', ${idx}))" class="opacity-0 group-hover:opacity-100 text-slate-200 hover:text-red-500 text-[10px] transition"><i class="fas fa-times"></i></button>` : ''}
                </div>
            `).join('') || '<p class="text-[10px] text-slate-400 italic">Vacío.</p>';
        }

        // --- CHAT (BITÁCORA) ---
        function renderChat(p) {
            if (!p.comments || p.comments.length === 0) return `<p class="text-center text-xs text-slate-400 mt-4 italic">No hay comentarios aún.</p>`;
            return p.comments.map(c => {
                const isDeleted = c.text === "🚫 [Comentario eliminado]";
                const hasHistory = c.history && c.history.length > 0;
                return `
                <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-200 relative group">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-xs font-black text-blue-700"><i class="fas fa-user-circle mr-1"></i>${c.author}</span>
                        <span class="text-[10px] text-slate-400">${c.date}</span>
                    </div>
                    <p class="text-sm ${isDeleted ? 'text-red-400 italic' : 'text-slate-700'}">${c.text}</p>
                    ${hasHistory ? `<button onclick="viewHistory(${p.id}, ${c.id})" class="text-[10px] text-blue-500 hover:underline mt-1 block"><i class="fas fa-history"></i> Modificado</button>` : ''}
                    ${!isDeleted && p.status !== 'Cerrado' ? `
                    <div class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition flex gap-1 bg-white px-1 shadow rounded border border-slate-100">
                        <button onclick="modifyComment(${p.id}, ${c.id}, 'edit')" class="text-slate-400 hover:text-blue-500 text-xs p-1" title="Editar"><i class="fas fa-edit"></i></button>
                        <button onclick="modifyComment(${p.id}, ${c.id}, 'delete')" class="text-slate-400 hover:text-red-500 text-xs p-1" title="Borrar"><i class="fas fa-trash"></i></button>
                    </div>` : ''}
                </div>`;
            }).join('');
        }

        function sendChatMessage(projId) {
            const input = document.getElementById('chat-input'); const author = document.getElementById('chat-author').value; const text = input.value.trim();
            if(!text) return;
            const p = projects.find(x => x.id === projId);
            p.comments.push({ id: Date.now(), author: author, text: text, date: new Date().toLocaleString(), history: [] });
            save(); selectProject(projId);
        }

        function modifyComment(projId, commentId, action) {
            const actionStr = action === 'delete' ? 'BORRAR' : 'EDITAR';
            
            requireIdentify((userWhoModifies) => {
                const p = projects.find(x => x.id === projId);
                const c = p.comments.find(x => x.id === commentId);

                if (action === 'delete') {
                    if (confirm(`Hola ${userWhoModifies}, ¿Seguro que deseas marcar esto como eliminado? Quedará registro.`)) {
                        c.history.push({ action: "Eliminado", by: userWhoModifies, date: new Date().toLocaleString(), oldText: c.text });
                        c.text = "🚫 [Comentario eliminado]"; save(); selectProject(projId);
                    }
                } else if (action === 'edit') {
                    const newText = prompt(`Hola ${userWhoModifies}, edita el comentario:`, c.text);
                    if (newText && newText.trim() !== "" && newText !== c.text) {
                        c.history.push({ action: "Editado", by: userWhoModifies, date: new Date().toLocaleString(), oldText: c.text });
                        c.text = newText; save(); selectProject(projId);
                    }
                }
            }, actionStr);
        }

        function viewHistory(projId, commentId) {
            const c = projects.find(x => x.id === projId).comments.find(x => x.id === commentId);
            let histStr = c.history.map(h => `📅 ${h.date}\n👤 Por: ${h.by}\n🛠️ Acción: ${h.action}\n📜 Texto anterior: "${h.oldText}"\n-------------------`).join('\n\n');
            alert(`🔍 HISTORIAL DE AUDITORÍA\n\n${histStr}`);
        }

        // --- ACCIONES GENERALES ---
        function toggleStep(id, type, idx) { projects.find(x => x.id === id)[type][idx].done = !projects.find(x => x.id === id)[type][idx].done; save(); selectProject(id); }
        function toggleStatus(id) { const p = projects.find(x => x.id === id); p.status = p.status === 'Abierto' ? 'Cerrado' : 'Abierto'; save(); selectProject(id); }
        function addItem(id, type) { const val = prompt(`Nuevo documento para ${type.toUpperCase()}:`); if(val) { projects.find(x => x.id === id)[type].push({name: val, done: false}); save(); selectProject(id); } }
        function deleteItem(id, type, idx) { projects.find(x => x.id === id)[type].splice(idx, 1); save(); selectProject(id); }
        
        // --- FUNCIONES RESTAURADAS PARA BOTONES INDIVIDUALES (TRASLADAR / ELIMINAR) ---
        function deleteProject(id) {
            if(confirm('¿Seguro que deseas eliminar definitivamente este proyecto?')) {
                projects = projects.filter(p => p.id !== id);
                save(); clearClient(); 
            }
        }

        function transferProject(id) {
            const p = projects.find(x => x.id === id);
            const newOp = prompt(`¿A qué operador trasladas este proyecto?\nOpciones: ${opsDB.join(', ')}`);
            if(newOp && opsDB.includes(newOp) && newOp !== currentOp) {
                p.operator = newOp; save();
                alert(`Proyecto trasladado a ${newOp}`);
                clearClient(); 
            } else if(newOp) {
                alert('Operador inválido o es el mismo.');
            }
        }
        
        // --- FORMULARIO ADMIN & EQUIPO ---
        function renderFormSelects() {
            document.getElementById('f-operator').innerHTML = opsDB.map(o => `<option value="${o}">${o}</option>`).join('');
            const mansHTML = mansDB.map(m => `<option value="${m}">${m}</option>`).join('');
            document.getElementById('f-man1').innerHTML = mansHTML; document.getElementById('f-man2').innerHTML = `<option value="">-- Ninguno --</option>` + mansHTML;
        }

        document.getElementById('project-form').onsubmit = (e) => {
            e.preventDefault(); const man1 = document.getElementById('f-man1').value; const man2 = document.getElementById('f-man2').value;
            const newP = {
                id: Date.now(), operator: document.getElementById('f-operator').value, client: document.getElementById('f-client').value.trim(),
                projectName: document.getElementById('f-project-name').value.trim(), deadline: document.getElementById('f-deadline').value,
                status: 'Abierto', managers: man2 ? [man1, man2] : [man1], comments: [],
                legal: document.getElementById('f-legal-list').value.split('\n').filter(l => l.trim()).map(n => ({name: n, done: false})),
                materialidad: document.getElementById('f-mat-list').value.split('\n').filter(l => l.trim()).map(n => ({name: n, done: false}))
            };
            projects.push(newP); save(); e.target.reset(); alert('Proyecto Creado'); goHome();
        };

        function renderTeamLists() {
            document.getElementById('list-ops').innerHTML = opsDB.map((op, i) => `
                <li class="flex justify-between items-center bg-slate-50 p-2 rounded-lg border border-slate-100">
                    <span class="font-bold text-slate-700"><i class="fas fa-user-circle text-blue-300 mr-2"></i>${op}</span> 
                    <div class="flex gap-2">
                        <button onclick="requireAuth(() => changePassword('ops', '${op}'))" class="text-blue-500 hover:bg-blue-100 px-2 py-1 rounded transition" title="Cambiar Contraseña"><i class="fas fa-key"></i></button>
                        <button onclick="requireAuth(() => removeTeamMember('ops', ${i}))" class="text-red-500 hover:bg-red-100 px-2 py-1 rounded transition" title="Eliminar"><i class="fas fa-trash"></i></button>
                    </div>
                </li>
            `).join('');
            
            document.getElementById('list-mans').innerHTML = mansDB.map((m, i) => `
                <li class="flex justify-between items-center bg-slate-50 p-2 rounded-lg border border-slate-100">
                    <span class="font-bold text-slate-700"><i class="fas fa-clipboard-check text-indigo-300 mr-2"></i>${m}</span> 
                    <div class="flex gap-2">
                        <button onclick="requireAuth(() => changePassword('mans', '${m}'))" class="text-indigo-500 hover:bg-indigo-100 px-2 py-1 rounded transition" title="Cambiar Contraseña"><i class="fas fa-key"></i></button>
                        <button onclick="requireAuth(() => removeTeamMember('mans', ${i}))" class="text-red-500 hover:bg-red-100 px-2 py-1 rounded transition" title="Eliminar"><i class="fas fa-trash"></i></button>
                    </div>
                </li>
            `).join('');
        }

        function addTeamMember(type) {
            if (type === 'ops') {
                const name = document.getElementById('new-operator').value.trim();
                const pass = document.getElementById('new-op-pass').value.trim();
                if (name && pass) {
                    opsDB.push(name); opPasswords[name] = pass; save();
                    document.getElementById('new-operator').value = ''; document.getElementById('new-op-pass').value = ''; renderTeamLists();
                } else { alert("⚠️ Asigna un nombre y contraseña obligatoriamente."); }
            } else {
                const name = document.getElementById('new-manager').value.trim();
                const pass = document.getElementById('new-man-pass').value.trim();
                if(name && pass) { 
                    mansDB.push(name); mansPasswords[name] = pass; save(); 
                    document.getElementById('new-manager').value = ''; document.getElementById('new-man-pass').value = ''; renderTeamLists(); 
                } else { alert("⚠️ Asigna un nombre y contraseña obligatoriamente."); }
            }
        }

        function removeTeamMember(type, idx) {
            if(confirm('¿Seguro que deseas eliminar a esta persona?')) {
                if(type === 'ops') {
                    const opName = opsDB[idx]; delete opPasswords[opName]; opsDB.splice(idx, 1);
                } else { 
                    const manName = mansDB[idx]; delete mansPasswords[manName]; mansDB.splice(idx, 1); 
                }
                save(); renderTeamLists();
            }
        }

        function changePassword(type, name) {
            const newPass = prompt(`🔑 Escribe la NUEVA CONTRASEÑA para ${name}:`);
            if (newPass && newPass.trim() !== "") {
                if(type === 'ops') { opPasswords[name] = newPass.trim(); } 
                else { mansPasswords[name] = newPass.trim(); }
                save(); alert(`✅ Contraseña de ${name} actualizada correctamente.`);
            }
        }

        function transferClient(clientName) {
            const newOp = prompt(`¿A qué operador trasladas TODOS los proyectos de ${clientName}?\nOpciones: ${opsDB.join(', ')}`);
            if(newOp && opsDB.includes(newOp) && newOp !== currentOp) {
                projects.forEach(p => { if(p.client === clientName && p.operator === currentOp) p.operator = newOp; });
                save(); renderSidebar(); alert(`Cliente trasladado a ${newOp}`);
            } else if(newOp) alert('Operador inválido o es el mismo.');
        }

        goHome();
    </script>
</body>
</html>
