        .badge-PENDIENTE { background: #7f8c8d; color: white; }

function initSelector() {
    const selector = document.getElementById('companySelector');
    rawData.forEach((item, index) => {
        const opt = document.createElement('option');
        opt.value = index;
        opt.textContent = item.empresa;
        selector.appendChild(opt);
    });
}

function getBadge(val) {
    let css = 'badge-PENDIENTE';
    if (val === 'SI') css = 'badge-SI';
    if (val === 'NO') css = 'badge-NO';
    return `<span class="badge ${css}">${val}</span>`;
}

function renderTable(dataArray) {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    dataArray.forEach(item => {
        const row = tbody.insertRow();
        row.insertCell(0).textContent = item.empresa;
        row.insertCell(1).innerHTML = getBadge(item.reconoce_empresa);
        row.insertCell(2).innerHTML = getBadge(item.corresponde_maps);
        row.insertCell(3).innerHTML = getBadge(item.acceder_oficina);
        row.insertCell(4).innerHTML = getBadge(item.infraestructura);
        row.insertCell(5).innerHTML = getBadge(item.personal_laborando);
        row.insertCell(6).innerHTML = `<span class="comment-text">${item.comentarios}</span>`;
    });
}

    const colors = labels.map(l => {
        if (l.includes('SI')) return '#27ae60';
        if (l.includes('NO')) return '#c0392b';
        return '#7f8c8d'; // PENDIENTE
    });

    myChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: labels,
            datasets: [{
                data: values,
                backgroundColor: colors,
                borderColor: '#1e1e1e',
                borderWidth: 3
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { position: 'bottom', labels: { color: '#ccc', font: { size: 12 } } }
            },
            animation: { animateScale: true, duration: 1000 }
        }
    });
}

function updateDashboard() {
    const val = document.getElementById('companySelector').value;
    const title = document.getElementById('viewTitle');
    const content = document.getElementById('viewContent');

    if (val === 'all') {
        title.textContent = "Métricas Generales";
        let si = rawData.filter(d => d.reconoce_empresa === 'SI').length;
        let no = rawData.filter(d => d.reconoce_empresa === 'NO').length;
        let pen = rawData.filter(d => d.reconoce_empresa === 'PENDIENTE').length;
        
        content.innerHTML = `
            <div class="data-item"><span class="label">Total de Empresas:</span> <span>${rawData.length}</span></div>
            <div class="data-item"><span class="label">Reconocidas (SI):</span> <span style="color:#27ae60; font-weight:bold;">${si}</span></div>
            <div class="data-item"><span class="label">No Reconocidas (NO):</span> <span style="color:#c0392b; font-weight:bold;">${no}</span></div>
            <div class="data-item"><span class="label">Pendientes / Sin Visita:</span> <span style="color:#7f8c8d; font-weight:bold;">${pen}</span></div>
        `;
        updateChart(['SI', 'NO', 'PENDIENTE'], [si, no, pen]);
        renderTable(rawData);
    } else {
        const item = rawData[val];
        title.textContent = item.empresa;
        content.innerHTML = `
            <div class="data-item"><span class="label">¿Se Reconoce?:</span> ${getBadge(item.reconoce_empresa)}</div>
            <div class="data-item"><span class="label">Corresponde a Maps:</span> ${getBadge(item.corresponde_maps)}</div>
            <div class="data-item"><span class="label">Acceso a Oficina:</span> ${getBadge(item.acceder_oficina)}</div>
            <div class="data-item"><span class="label">Infraestructura:</span> ${getBadge(item.infraestructura)}</div>
            <div class="data-item"><span class="label">Personal Laborando:</span> ${getBadge(item.personal_laborando)}</div>
            <div style="margin-top:15px;">
                <span class="label">Comentarios:</span><br>
                <p class="comment-text">${item.comentarios}</p>
            </div>
        `;
        
        const currentStatus = item.reconoce_empresa;
        const label = currentStatus === 'SI' ? 'RECONOCIDA' : (currentStatus === 'NO' ? 'NO RECONOCIDA' : 'PENDIENTE');
        updateChart([label], [1]);
        renderTable([item]);
    }
}

initSelector();
updateDashboard();
</script>
</body>
</html>
